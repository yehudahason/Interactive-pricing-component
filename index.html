<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interactive-pricing-component</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main
      class="flex flex-col justify-center items-center w-full h-screen relative"
    >
      <img
        src="/images/bg-pattern.svg"
        alt=""
        class="z-[-2] absolute top-0 w-full h-[50vh]"
      />

      <h1 class="text-dark-blue font-bold text-3xl mb-4 z-20 text-center">
        Simple,
        <span class="relative"
          >traffic-based
          <img
            src="/images/pattern-circles.svg"
            alt=""
            class="z-[-1] absolute left-[50%] translate-[-50%] top-7"
        /></span>
        pricing
      </h1>
      <p class="text-center text-lg font-semibold text-light-blue mb-22">
        Sign-up for our 30-day trial. No credit card required.
      </p>
      <div class="pricing-card">
        <div class="pricing-card__header">
          <div class="pricing-card__top">
            <span class="pageviews">100K PAGEVIEWS</span>

            <div class="price">
              <span class="price__amount">$16.00</span>
              <span class="price__period">/ month</span>
            </div>
          </div>

          <div class="slider-wrapper">
            <input type="range" min="0" max="100" value="50" />
          </div>

          <div class="billing-toggle">
            <span>Monthly Billing</span>

            <label class="switch">
              <input type="checkbox" />
              <span></span>
            </label>

            <span>Yearly Billing</span>

            <span class="discount">25% discount</span>
          </div>
        </div>

        <div class="pricing-card__footer">
          <ul class="features">
            <li>Unlimited websites</li>
            <li>100% data ownership</li>
            <li>Email reports</li>
          </ul>

          <button type="button">Start my trial</button>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
