<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interactive-pricing-component</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main
      class="flex flex-col justify-center items-center w-full h-screen relative"
    >
      <img
        src="/images/bg-pattern.svg"
        alt=""
        class="z-[-2] absolute top-0 w-full h-[50vh]"
      />

      <h1 class="text-dark-blue font-bold text-3xl mb-4 z-20 text-center">
        Simple,
        <span class="relative"
          >traffic-based
          <img
            src="/images/pattern-circles.svg"
            alt=""
            class="z-[-1] absolute left-[50%] translate-[-50%] top-7"
        /></span>
        pricing
      </h1>
      <p class="text-center text-lg font-semibold text-light-blue mb-12">
        Sign-up for our 30-day trial. No credit card required.
      </p>
      <div
        class="pricing-card w-135 h-100 bg-white p-8 flex flex-col justify-center items-center gap-4 shadow-2xl"
      >
        <div class="flex flex-col gap-8 pricing-card__header w-full">
          <div
            class="pricing-card__top flex justify-between w-full items-center"
          >
            <span
              class="pageviews text-light-blue text-xl tracking-widest font-bold"
              >100K PAGEVIEWS</span
            >

            <div class="price">
              <span
                class="price__amount text-4xl text-dark-blue tracking-tighter font-bold"
                >$16.00</span
              >
              <span class="price__period text-light-blue text-xl">/ month</span>
            </div>
          </div>

          <div class="slider-wrapper">
            <input
              id="slider"
              type="range"
              min="0"
              max="100"
              value="50"
              class="slider w-full h-2 appearance-none rounded-full bg-slate-200 [&::-webkit-slider-thumb]:shadow-[0_15px_30px_rgba(16,213,194,0.7)]"
            />
          </div>

          <div class="billing-toggle flex justify-end items-center gap-4">
            <span>Monthly Billing</span>

            <label class="relative inline-block w-11 h-6 cursor-pointer">
              <input type="checkbox" class="peer sr-only" />

              <span
                class="absolute inset-0 rounded-full transition peer-checked:bg-[#10D5C2] bg-[#CFD8F6] before:content-[''] before:absolute before:w-4 before:h-4 before:bg-white before:rounded-full before:left-1 before:top-1 before:transition-transform peer-checked:before:translate-x-5"
              ></span>
            </label>

            <span>Yearly Billing</span>

            <span class="discount">25% discount</span>
          </div>
        </div>

        <div class="pricing-card__footer">
          <ul class="features">
            <li>Unlimited websites</li>
            <li>100% data ownership</li>
            <li>Email reports</li>
          </ul>

          <button type="button">Start my trial</button>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
