<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interactive-pricing-component</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main
      class="flex flex-col justify-center items-center w-full h-screen relative"
    >
      <img
        src="/images/bg-pattern.svg"
        alt=""
        class="z-[-2] absolute top-0 w-full h-[50vh]"
      />

      <h1 class="text-dark-blue font-bold text-3xl mb-4 z-20 text-center">
        Simple,
        <span class="relative"
          >traffic-based
          <img
            src="/images/pattern-circles.svg"
            alt=""
            class="z-[-1] absolute left-[50%] translate-[-50%] top-7"
        /></span>
        pricing
      </h1>
      <p class="text-center text-lg font-semibold text-light-blue mb-12">
        Sign-up for our 30-day trial. No credit card required.
      </p>
      <div
        class="pricing-card w-full sm:w-135 sm:h-100 h-fit bg-white sm:p-8 px-2 py-4 flex flex-col justify-center items-center gap-4 shadow-2xl rounded-xl"
      >
        <div class="flex flex-col gap-8 pricing-card__header w-full">
          <div
            class="pricing-card__top flex justify-between w-full items-center"
          >
            <span
              id="pageviews"
              class="pageviews text-light-blue sm:text-xl tracking-widest font-bold"
              >100K PAGEVIEWS</span
            >

            <div class="price">
              <span
                id="price_amount"
                class="price__amount sm:text-4xl text-dark-blue tracking-tighter font-bold"
                >$16.00</span
              >
              <span class="price__period text-light-blue sm:text-xl"
                >/ month</span
              >
            </div>
          </div>

          <label class="slider-wrapper" aria-label="slider">
            <input
              id="slider"
              type="range"
              min="0"
              max="4"
              value="2"
              step="1"
              class="slider w-full h-2 appearance-none rounded-full bg-slate-200 hover:cursor-pointer [&::-webkit-slider-thumb]:shadow-[0_15px_30px_rgba(16,213,194,0.7)]"
            />
          </label>

          <div
            class="billing-toggle flex sm:justify-end justify-center items-center sm:gap-6 gap-3"
          >
            <span
              class="text-light-blue small:text-sm text-[0.7rem] font-semibold"
              >Monthly Billing</span
            >

            <label
              aria-label="Choose"
              class="relative inline-block w-9 h-5 cursor-pointer"
            >
              <input id="checkbox" type="checkbox" class="peer sr-only" />

              <span
                class="absolute inset-0 rounded-full hover:bg-[#10D5C2] transition peer-checked:bg-[#10D5C2] bg-[#CFD8F6] before:content-[''] before:absolute before:w-3 before:h-3 before:bg-white before:rounded-full before:left-1 before:top-1 before:transition-transform peer-checked:before:translate-x-4 peer-focus:ring-2 peer-focus:ring-blue-500 peer-focus:ring-offset-2"
              >
              </span>
            </label>

            <span
              class="text-light-blue font-semibold inline-block small:text-sm text-[0.7rem] sm:text-[0.8rem]"
              >Yearly Billing</span
            >

            <span
              class="discount bg-light-orange text-med-orange sm:px-2 py-0 rounded-4xl font-semibold small:text-[0.8rem] sm:text-[0.8rem] gap-1 flex-1 text-[0.7rem] small:max-w-26 text-center"
              >25% discount</span
            >
          </div>
        </div>
        <hr class="sm:w-[113%] h-px w-[104%] mt-6 border-light-gray" />
        <div
          class="mt-8 pricing-card__footer flex justify-between items-center w-full"
        >
          <ul
            class="features text-sm text-light-blue font-semibold"
            aria-label="Why to choose us"
          >
            <li class="flex items-center gap-2">
              <img class="w-2 h-3" src="/images/icon-check.svg" alt="" />
              Unlimited websites
            </li>
            <li class="flex items-center gap-2">
              <img class="w-2 h-3" src="/images/icon-check.svg" alt="" />100%
              data ownership
            </li>
            <li class="flex items-center gap-2">
              <img class="w-2 h-3" src="/images/icon-check.svg" alt="" />Email
              reports
            </li>
          </ul>

          <button
            type="button"
            class="bg-blue-950 cursor-pointer hover:opacity-90 rounded-full text-white text-sm py-2 font-semibold sm:px-6 px-3"
          >
            Start my trial
          </button>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
